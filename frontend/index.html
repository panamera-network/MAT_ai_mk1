<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAT.ai</title>
    <!--
      Content Security Policy (renderer):
      - Stops the yellow “Insecure Content-Security-Policy” warning in Electron.
      - Keeps `unsafe-eval` for Vite dev/HMR; MAT.ai Mark 1 is a local-first desktop app.
      - `connect-src` must allow the Vite dev server + websocket HMR endpoints.
      - Note: `frame-ancestors` is ignored in `<meta>` CSP (spec); omit it here to avoid console noise.
        For `frame-ancestors`, use an HTTP header (e.g. `session.webRequest.onHeadersReceived`) if you need it.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:* wss://127.0.0.1:* wss://localhost:* https://www.google.com https://www.gstatic.com; worker-src 'self' blob:;"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
